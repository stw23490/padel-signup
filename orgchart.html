<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candy Crush Soda Saga — Org Chart</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --card-hover: #334155;
    --border: #334155;
    --text: #f1f5f9;
    --text-dim: #94a3b8;
    --accent: #6366f1;
    --line: #475569;
    --open-bg: #422006;
    --open-border: #f59e0b;
    --leave-border: #a78bfa;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
    padding: 24px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,.4);
  }

  header h1 {
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  header h1 span { font-weight: 300; opacity: .8; }

  .controls {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }

  #search {
    padding: 8px 14px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,.25);
    background: rgba(255,255,255,.12);
    color: #fff;
    font-size: .9rem;
    width: 260px;
    outline: none;
    transition: border .2s;
  }
  #search::placeholder { color: rgba(255,255,255,.5); }
  #search:focus { border-color: #fff; }

  .btn {
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,.25);
    background: rgba(255,255,255,.1);
    color: #fff;
    font-size: .85rem;
    cursor: pointer;
    transition: background .2s;
  }
  .btn:hover { background: rgba(255,255,255,.2); }

  .stats {
    display: flex;
    gap: 20px;
    padding: 16px 32px;
    background: #1a1f35;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .stat-val { font-size: 1.3rem; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: .75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: .5px; }

  .legend {
    display: flex;
    gap: 16px;
    padding: 12px 32px;
    background: #1a1f35;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    align-items: center;
  }
  .legend-title { font-size: .75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: .5px; margin-right: 4px; }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: .78rem;
    color: var(--text-dim);
  }
  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 3px;
  }

  #tree {
    padding: 24px 32px 48px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .node {
    position: relative;
  }

  .node-card {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 4px;
    cursor: pointer;
    transition: all .15s ease;
    border-left: 4px solid var(--craft-color, var(--accent));
  }

  .node-card:hover {
    background: var(--card-hover);
    transform: translateX(3px);
  }

  .node-card.highlight {
    box-shadow: 0 0 0 2px var(--accent), 0 0 16px rgba(99,102,241,.3);
  }

  .node-card.is-open {
    background: var(--open-bg);
    border-color: var(--open-border);
    border-left-color: var(--open-border);
  }

  .node-card.on-leave {
    border-left-color: var(--leave-border);
    opacity: .75;
  }

  .avatar {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: .85rem;
    flex-shrink: 0;
    color: #fff;
  }

  .info { flex: 1; min-width: 0; }
  .info .name {
    font-weight: 600;
    font-size: .9rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .info .title-line {
    font-size: .78rem;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .meta-badges {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
    flex-wrap: wrap;
    justify-content: flex-end;
  }
  .badge {
    padding: 3px 8px;
    border-radius: 5px;
    font-size: .68rem;
    font-weight: 600;
    background: rgba(99,102,241,.15);
    color: #818cf8;
    white-space: nowrap;
  }
  .badge.loc {
    background: rgba(34,197,94,.1);
    color: #4ade80;
  }
  .badge.grade-badge {
    background: rgba(251,191,36,.12);
    color: #fbbf24;
  }

  .toggle-btn {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 1.5px solid var(--text-dim);
    background: transparent;
    color: var(--text-dim);
    font-size: .7rem;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: all .15s;
  }
  .toggle-btn:hover { border-color: var(--accent); color: var(--accent); }

  .children {
    margin-left: 28px;
    padding-left: 20px;
    border-left: 2px solid var(--line);
    overflow: hidden;
    transition: max-height .3s ease;
  }

  .children.collapsed {
    max-height: 0 !important;
    opacity: 0;
    pointer-events: none;
  }
  .children.expanded {
    opacity: 1;
    pointer-events: auto;
  }

  .child-count {
    font-size: .7rem;
    color: var(--text-dim);
    margin-left: 4px;
  }

  /* Craft colors */
  .craft-management    { --craft-color: #ef4444; }
  .craft-production    { --craft-color: #f59e0b; }
  .craft-design        { --craft-color: #10b981; }
  .craft-programming   { --craft-color: #3b82f6; }
  .craft-bi            { --craft-color: #8b5cf6; }
  .craft-art           { --craft-color: #ec4899; }
  .craft-animation     { --craft-color: #f97316; }
  .craft-qa            { --craft-color: #14b8a6; }
  .craft-marketing     { --craft-color: #06b6d4; }
  .craft-admin         { --craft-color: #64748b; }
  .craft-bizdev        { --craft-color: #a3e635; }
  .craft-unknown       { --craft-color: #6366f1; }

  .no-results {
    text-align: center;
    padding: 48px;
    color: var(--text-dim);
    font-size: 1.1rem;
  }

  @media (max-width: 768px) {
    header { padding: 16px; }
    #search { width: 100%; }
    #tree { padding: 16px; }
    .meta-badges { display: none; }
    .children { margin-left: 16px; padding-left: 12px; }
  }
</style>

// ─── Craft extraction ───
function getCraft(lc) {
  if (!lc) return "unknown";
  const m = lc.match(/\(([^)]+)\)/);
  if (!m) return "unknown";
  const c = m[1].toLowerCase().trim();
  if (c === "(blank)" || c === "blank") return "unknown";
  if (c.includes("business")) return "bi";
  if (c.includes("admin")) return "admin";
  if (c.includes("quality")) return "qa";
  if (c.includes("market")) return "marketing";
  if (c.includes("anim")) return "animation";
  if (c.includes("business dev")) return "bizdev";
  return c;
}

const craftColors = {
  management: "#ef4444", production: "#f59e0b", design: "#10b981",
  programming: "#3b82f6", bi: "#8b5cf6", art: "#ec4899",
  animation: "#f97316", qa: "#14b8a6", marketing: "#06b6d4",
  admin: "#64748b", "business development": "#a3e635", unknown: "#6366f1"
};
const craftLabels = {
  management: "Management", production: "Production", design: "Design",
  programming: "Programming", bi: "Business Intelligence", art: "Art",
  animation: "Animation", qa: "Quality Assurance", marketing: "Marketing",
  admin: "Administration", "business development": "Business Dev", unknown: "Other"
};

// ─── Build tree ───
function buildTree(data) {
  const nodes = data.map((d, i) => ({
    id: i,
    name: d.n.replace(/\s*\(On Leave\)/i, "").replace(/\s*\[C\]/i, "").replace(/\s*\(\w+_?\d+\)/g, "").trim(),
    fullName: d.n,
    position: d.pos,
    title: d.title || "(No title)",
    location: d.loc || "",
    costCenter: d.cc || "",
    levelCraft: d.lc || "",
    grade: d.g,
    type: d.t || "",
    level: d.lvl,
    craft: getCraft(d.lc),
    isOpen: /^Open\d*$/i.test(d.n.replace(/\s*\(\w+_?\d+\)/g, "").trim()),
    onLeave: /on leave/i.test(d.n),
    children: []
  }));

  const root = nodes[0];
  const stack = [root];

  for (let i = 1; i < nodes.length; i++) {
    const node = nodes[i];
    while (stack.length > 1 && stack[stack.length - 1].level >= node.level) {
      stack.pop();
    }
    stack[stack.length - 1].children.push(node);
    stack.push(node);
  }
  return root;
}

// ─── Count descendants ───
function countDescendants(node) {
  let c = 0;
  for (const ch of node.children) {
    c += 1 + countDescendants(ch);
  }
  return c;
}

// ─── Render ───
function getInitials(name) {
  const parts = name.split(/\s+/).filter(p => !p.startsWith("("));
  return (parts[0]?.[0] || "") + (parts[1]?.[0] || "");
}

function shortLoc(loc) {
  if (!loc) return "";
  if (loc.includes("Stockholm")) return "Stockholm";
  if (loc.includes("Barcelona")) return "Barcelona";
  if (loc.includes("London")) return "London";
  if (loc.includes("Berlin")) return "Berlin";
  if (loc.includes("Malmö")) return "Malmö";
  if (loc.includes("Work From Home")) return "WFH";
  return loc;
}

function renderNode(node, depth = 0) {
  const hasChildren = node.children.length > 0;
  const descCount = countDescendants(node);
  const craftClass = `craft-${node.craft}`;
  const color = craftColors[node.craft] || craftColors.unknown;
  const isOpenClass = node.isOpen ? "is-open" : "";
  const leaveClass = node.onLeave ? "on-leave" : "";

  let html = `<div class="node" data-id="${node.id}">`;
  html += `<div class="node-card ${craftClass} ${isOpenClass} ${leaveClass}" onclick="toggleNode(${node.id})" data-search="${(node.name + ' ' + node.title + ' ' + node.location + ' ' + node.craft).toLowerCase()}">`;

  // Avatar
  html += `<div class="avatar" style="background:${color}">${node.isOpen ? "?" : getInitials(node.name)}</div>`;

  // Info
  html += `<div class="info">`;
  html += `<div class="name">${node.isOpen ? node.fullName + " (Vacant)" : node.name}${node.onLeave ? ' <span style="color:#a78bfa;font-size:.75rem">(On Leave)</span>' : ""}</div>`;
  html += `<div class="title-line">${node.title}${node.grade ? " · G" + node.grade : ""}</div>`;
  html += `</div>`;

  // Badges
  html += `<div class="meta-badges">`;
  if (node.location) html += `<span class="badge loc">${shortLoc(node.location)}</span>`;
  html += `<span class="badge">${craftLabels[node.craft] || node.craft}</span>`;
  if (node.type && node.type !== "Regular") html += `<span class="badge grade-badge">${node.type}</span>`;
  html += `</div>`;

  // Toggle
  if (hasChildren) {
    html += `<button class="toggle-btn" id="tbtn-${node.id}">&#9660;</button>`;
    html += `<span class="child-count">${descCount}</span>`;
  }

  html += `</div>`; // end node-card

  if (hasChildren) {
    const expanded = depth < 2;
    html += `<div class="children ${expanded ? "expanded" : "collapsed"}" id="ch-${node.id}">`;
    for (const ch of node.children) {
      html += renderNode(ch, depth + 1);
    }
    html += `</div>`;
  }

  html += `</div>`; // end node
  return html;
}

// ─── Build and render ───
const tree = buildTree(RAW);

document.getElementById("tree").innerHTML = renderNode(tree);

// Stats
const totalFilled = RAW.filter(d => !/^Open\d*$/i.test(d.n.replace(/\s*\(\w+_?\d+\)/g, "").trim())).length;
const totalOpen = RAW.length - totalFilled;
const onLeave = RAW.filter(d => /on leave/i.test(d.n)).length;
const locations = new Set(RAW.map(d => shortLoc(d.loc)).filter(Boolean));

document.getElementById("stats").innerHTML = `
  <div class="stat"><span class="stat-val">${RAW.length}</span><span class="stat-label">Total Positions</span></div>
  <div class="stat"><span class="stat-val">${totalFilled}</span><span class="stat-label">Filled</span></div>
  <div class="stat"><span class="stat-val">${totalOpen}</span><span class="stat-label">Open Positions</span></div>
  <div class="stat"><span class="stat-val">${onLeave}</span><span class="stat-label">On Leave</span></div>
  <div class="stat"><span class="stat-val">${locations.size}</span><span class="stat-label">Locations</span></div>
`;

// Legend
const craftsUsed = [...new Set(RAW.map(d => getCraft(d.lc)))].sort();
document.getElementById("legend").innerHTML = `<span class="legend-title">Crafts:</span>` +
  craftsUsed.map(c => `<span class="legend-item"><span class="legend-dot" style="background:${craftColors[c] || craftColors.unknown}"></span>${craftLabels[c] || c}</span>`).join("");

// ─── Interactions ───
function toggleNode(id) {
  const el = document.getElementById("ch-" + id);
  if (!el) return;
  const btn = document.getElementById("tbtn-" + id);
  if (el.classList.contains("collapsed")) {
    el.classList.remove("collapsed");
    el.classList.add("expanded");
    el.style.maxHeight = el.scrollHeight + "px";
    if (btn) btn.innerHTML = "&#9650;";
  } else {
    el.classList.remove("expanded");
    el.classList.add("collapsed");
    el.style.maxHeight = "0px";
    if (btn) btn.innerHTML = "&#9660;";
  }
}

function expandAll() {
  document.querySelectorAll(".children").forEach(el => {
    el.classList.remove("collapsed");
    el.classList.add("expanded");
    el.style.maxHeight = el.scrollHeight + 9999 + "px";
  });
  document.querySelectorAll(".toggle-btn").forEach(b => b.innerHTML = "&#9650;");
}

function collapseAll() {
  document.querySelectorAll(".children").forEach(el => {
    el.classList.remove("expanded");
    el.classList.add("collapsed");
    el.style.maxHeight = "0px";
  });
  document.querySelectorAll(".toggle-btn").forEach(b => b.innerHTML = "&#9660;");
}

// Search
document.getElementById("search").addEventListener("input", function() {
  const q = this.value.toLowerCase().trim();
  document.querySelectorAll(".node-card").forEach(card => {
    const match = !q || card.dataset.search.includes(q);
    card.classList.toggle("highlight", match && q.length > 0);
    card.style.display = "";
  });
  if (q.length > 0) expandAll();
});

// Fix max-heights after load
setTimeout(() => {
  document.querySelectorAll(".children.expanded").forEach(el => {
    el.style.maxHeight = el.scrollHeight + 9999 + "px";
  });
}, 100);
</script>
